name: Droid Issue to PR

on:
  issues:
    types: [labeled]

permissions: {}

jobs:
  implement:
    if: github.event.label.name == 'droid-implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up the Droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Implement the issue
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          {
            echo "# Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo
            echo "${ISSUE_BODY}"
          } > /tmp/issue.md

          droid exec --auto high "$(cat <<'PROMPT'
          Read the GitHub issue described in the file /tmp/issue.md and implement the
          requested change in this repository.

          Requirements:
          - Follow the conventions documented in AGENTS.md and CONTRIBUTING.md if present.
          - Make focused, production-quality changes that fully address the issue.
          - Run relevant builds/tests where practical to validate your work.
          - Do NOT create commits, do NOT push, and do NOT open a pull request.
            Leave all changes in the working tree; the workflow handles git.
          PROMPT
          )"

      - name: Open a pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Droid produced no changes; nothing to open a PR for."
            exit 0
          fi

          BRANCH="droid/issue-${ISSUE_NUMBER}-$(date +%s)"
          git config user.name "factory-droid[bot]"
          git config user.email "138933559+factory-droid[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -s -m "feat: implement issue #${ISSUE_NUMBER}

          ${ISSUE_TITLE}

          Co-authored-by: factory-droid[bot] <138933559+factory-droid[bot]@users.noreply.github.com>"
          git push origin "$BRANCH"

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --title "Implement #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Automated implementation for issue #${ISSUE_NUMBER}, generated by \`droid exec\`.

          Closes #${ISSUE_NUMBER}

          Please review carefully before merging."
