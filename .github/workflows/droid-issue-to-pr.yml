name: Droid Issue to PR

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  droid-issue-to-pr:
    if: |
      contains(github.event.issue.body, '@droid') ||
      contains(github.event.issue.title, '@droid')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Run Droid Issue to PR
        uses: Factory-AI/droid-action@49188f4035f23e609bbeee36ec5b22e72212a8e5 # main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          track_progress: true
