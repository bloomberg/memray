name: News entry check
on:
  pull_request:
    paths:
      - "src/memray/**"
    types:
      - "opened"
      - "reopened"
      - "synchronize"
      - "labeled"
      - "unlabeled"

permissions: {}

jobs:
  news_entry_check:
    runs-on: ubuntu-latest
    name: Check for news entry
    steps:
      - name: "Check for news entry"
        uses: brettcannon/check-for-changed-files@871d7b8b5917a4f6f06662e2262e8ffc51dff6d1 # v1.2.1
        with:
          file-pattern: |
            news/*.rst
            NEWS.rst
          skip-label: "skip news"
          failure-message: "Missing a news file in ${file-pattern}; please add one or apply the ${skip-label} label to the pull request"
